  <path d="M160 44 L196 80 H168 a8 8 0 0 1 -8 -8 Z" fill="#C7D7F5"/>

  <!-- Wordmark DPH -->
  <text x="80" y="128" font-family="DejaVu Sans, Arial, sans-serif" font-size="42" font-weight="700" fill="#1D4ED8" letter-spacing="1">DPH</text>

  <!-- Řádky dokladu -->
  <g fill="#CBD5E1">
    <rect x="80" y="146" width="96" height="9" rx="4.5"/>
    <rect x="80" y="166" width="96" height="9" rx="4.5"/>
    <rect x="80" y="186" width="60" height="9" rx="4.5"/>
  </g>

  <!-- Zelený badge se zaškrtnutím -->
