<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="check" x1="150" y1="150" x2="226" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
  </defs>

  <!-- Pozadí -->
  <rect x="0" y="0" width="256" height="256" rx="56" fill="url(#bg)"/>
  <rect x="0" y="0" width="256" height="256" rx="56" fill="#FFFFFF" opacity="0.04"/>

  <!-- Měkký stín pod dokladem -->
  <path d="M64 50 H160 L196 86 V218 a8 8 0 0 1 -8 8 H64 a8 8 0 0 1 -8 -8 V58 a8 8 0 0 1 8 -8 Z" fill="#0B1F4D" opacity="0.28"/>

  <!-- List dokladu se založeným rohem -->
