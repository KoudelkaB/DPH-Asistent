ShortDescription: Evidence podkladů k DPH, kontrolní hlášení a vystavování faktur.
Description: |-
  DPH Asistent je desktopová aplikace pro evidenci podkladů k českému přiznání k DPH,
  kontrolnímu hlášení a vystavování faktur. Generuje XML dávky pro EPO (přiznání k DPH
  a kontrolní hlášení), umožňuje vystavovat faktury do PDF s QR platbou a data ukládá
  lokálně do SQLite databáze. Nenahrazuje účetní ani kontrolu v portálu EPO před podáním.
