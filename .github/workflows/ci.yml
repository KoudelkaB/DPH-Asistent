name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Dph.slnx

      - name: Build
        run: dotnet build Dph.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/Dph.Core.Tests/Dph.Core.Tests.csproj -c Release --no-build
